<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEULSRA - Çok Yakında</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@300&display=swap" rel="stylesheet">
    <style>
        /* Tüm stilleri buraya topluyoruz ki dosya hatası olmasın */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1e 0%, #0a0a0c 100%);
        }

        .content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .deulsra {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem); /* Ekrana göre boyutlanır */
            font-weight: 700;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 
                0 0 10px #00e5ff, 
                0 0 20px #00e5ff, 
                0 0 40px #00e5ff, 
                0 0 80px #d500f9;
        }

        .neon-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 4vw, 2.5rem);
            margin-top: 20px;
            color: #ff1744;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff1744, 0 0 20px #ff1744;
        }

        .blinking {
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 class="deulsra">DEULSRA</h1>
        <p class="neon-text blinking">ÇOK YAKINDA</p>
    </div>
</body>
</html>
